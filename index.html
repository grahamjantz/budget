<style>
:root {
  --bg:#f5f2ec; --surface:#fff; --sidebar-bg:#1a1a18; --sidebar-tx:#e8e4d9;
  --sidebar-muted:#7a7870; --accent:#c8572a; --accent-lt:#f0e8e2;
  --border:#ddd9d0; --tx:#1a1a18; --tx-muted:#7a7870;
  --cash-hdr:#1e3a2f; --debit-hdr:#1a2a3e; --row-hover:#faf8f4;
  --font-mono:'DM Mono',monospace; --font-serif:'Fraunces',Georgia,serif;
  --shadow:0 2px 12px rgba(0,0,0,0.08); --radius:6px; --sidebar-w:260px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-mono);background:var(--bg);color:var(--tx);height:100vh;display:flex;overflow:hidden}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px;animation:fadeIn .4s ease}
#login-screen.hidden{display:none}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:52px 48px;text-align:center;box-shadow:var(--shadow);max-width:380px;width:90%}
.login-card h1{font-family:var(--font-serif);font-size:2.4rem;font-weight:600;color:var(--tx);line-height:1.1;margin-bottom:8px}
.login-card p{color:var(--tx-muted);font-size:.82rem;margin-bottom:32px;line-height:1.6}
.google-btn{display:inline-flex;align-items:center;gap:10px;background:var(--tx);color:#fff;border:none;border-radius:var(--radius);padding:13px 28px;font-family:var(--font-mono);font-size:.85rem;font-weight:500;cursor:pointer;transition:background .15s;letter-spacing:.03em}
.google-btn:hover{background:#333}

/* LAYOUT */
#app{display:flex;width:100%;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar-bg);color:var(--sidebar-tx);display:flex;flex-direction:column;height:100vh;overflow:hidden;flex-shrink:0}
.sidebar-header{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.sidebar-header h2{font-family:var(--font-serif);font-size:1.35rem;font-weight:600;font-style:italic;letter-spacing:-.01em;color:#fff;margin-bottom:2px}
.user-email{font-size:.7rem;color:var(--sidebar-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-close-btn{border:1px solid rgba(255,255,255,.12);background:transparent;color:var(--sidebar-tx);border-radius:999px;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;flex-shrink:0}
.sidebar-actions{padding:14px 16px 10px;display:flex;gap:8px}
.btn-new{flex:1;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:9px 10px;font-family:var(--font-mono);font-size:.75rem;font-weight:500;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:opacity .15s}
.btn-new:hover{opacity:.85}
.sidebar-search{padding:0 16px 10px}
.sidebar-search input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius);color:var(--sidebar-tx);font-family:var(--font-mono);font-size:.75rem;padding:7px 10px;outline:none;transition:border-color .15s}
.sidebar-search input::placeholder{color:var(--sidebar-muted)}
.sidebar-search input:focus{border-color:var(--accent)}
#budget-list{flex:1;overflow-y:auto;padding:4px 8px}
#budget-list::-webkit-scrollbar{width:4px}
#budget-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.budget-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:background .12s;position:relative}
.budget-item:hover{background:rgba(255,255,255,.07)}
.budget-item.active{background:rgba(200,87,42,.2)}
.budget-item-info{flex:1;min-width:0}
.budget-item-name{font-size:.8rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--sidebar-tx)}
.budget-item.active .budget-item-name{color:#fff}
.budget-item-date{font-size:.68rem;color:var(--sidebar-muted);margin-top:2px}
.budget-item-menu-btn{background:none;border:none;color:var(--sidebar-muted);cursor:pointer;padding:4px 6px;border-radius:3px;font-size:1rem;line-height:1;transition:color .12s,background .12s;flex-shrink:0;display:none}
.budget-item:hover .budget-item-menu-btn{display:block}
.budget-item-menu-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
.sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.07)}
.btn-signout{width:100%;background:none;border:1px solid rgba(255,255,255,.1);color:var(--sidebar-muted);border-radius:var(--radius);padding:8px;font-family:var(--font-mono);font-size:.73rem;cursor:pointer;transition:color .15s,border-color .15s;letter-spacing:.04em;text-transform:uppercase}
.btn-signout:hover{color:var(--sidebar-tx);border-color:rgba(255,255,255,.25)}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:90;display:none}
.sidebar-overlay.visible{display:block}

/* TOOLBAR */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh}
#toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
#budget-name-input{font-family:var(--font-serif);font-size:1.25rem;font-weight:600;font-style:italic;border:none;outline:none;background:transparent;color:var(--tx);min-width:200px;max-width:400px;padding:4px 8px;border-radius:4px;transition:background .12s}
#budget-name-input:hover{background:var(--bg)}
#budget-name-input:focus{background:var(--accent-lt)}
#budget-name-input:disabled{opacity:.5;cursor:not-allowed}
.toolbar-spacer{flex:1}
.status-indicator{font-size:.73rem;color:var(--tx-muted);display:flex;align-items:center;gap:6px;min-width:90px;justify-content:flex-end}
.status-indicator.saving{color:#c8922a}
.status-indicator.saved{color:#2a8c57}
.status-indicator.error{color:#c82a2a}
.btn-toolbar{background:none;border:1px solid var(--border);color:var(--tx-muted);border-radius:var(--radius);padding:6px 14px;font-family:var(--font-mono);font-size:.73rem;cursor:pointer;transition:all .12s;letter-spacing:.03em}
.btn-toolbar:hover{border-color:var(--tx-muted);color:var(--tx)}

/* 3-dot budget options menu (toolbar) */
.btn-budget-options{background:none;border:1px solid var(--border);color:var(--tx-muted);border-radius:var(--radius);padding:6px 10px;font-family:var(--font-mono);font-size:1rem;cursor:pointer;transition:all .12s;line-height:1}
.btn-budget-options:hover{border-color:var(--tx-muted);color:var(--tx)}

/* LOCK BADGE */
.lock-badge{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;padding:4px 10px;border-radius:999px;font-weight:500;letter-spacing:.04em}
.lock-badge.locked{background:#fff3cd;color:#856404;border:1px solid #ffc107}
.lock-badge.complete{background:#d1e7dd;color:#0a3622;border:1px solid #198754}
.lock-badge.editable{background:#e2e3e5;color:#41464b;border:1px solid #adb5bd}

/* MOBILE MENU BTN */
.mobile-menu-btn{display:none;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--tx-muted);padding:8px;margin-right:4px;flex-shrink:0}

/* EDITOR */
#editor{flex:1;overflow-y:auto;padding:28px 24px 60px;display:flex;flex-direction:column;gap:36px}
#editor::-webkit-scrollbar{width:6px}
#editor::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#editor.locked-mode input,#editor.locked-mode button:not(.btn-export-bills){pointer-events:none;opacity:.75}
#editor.locked-mode .btn-delete-row,#editor.locked-mode .btn-add-row,#editor.locked-mode .row-menu-btn{display:none!important}
#editor.locked-mode [draggable]{cursor:default}

/* GRAND TOTAL PANEL */
.grand-total-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);display:flex;flex-direction:column}
.grand-total-header{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--accent);color:#fff;padding:12px 14px;border-radius:10px 10px 0 0}
.grand-total-title{font-family:var(--font-serif);font-size:1.05rem;font-weight:600}
.grand-total-grid{display:flex;flex-direction:column;gap:12px;padding:18px 20px 16px}
.grand-total-group{display:flex;gap:12px}
.grand-total-row{flex:1 1 0;display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:8px;min-width:0}
.grand-total-row span{color:var(--tx-muted);font-size:.76rem}
.grand-total-row strong{font-family:var(--font-mono);font-size:.9rem;color:inherit}
.grand-total-row.positive{color:#2a8c57}
.grand-total-row.negative{color:#c82a2a}
.grand-total-input{width:120px;border:1px solid var(--border);border-radius:6px;background:#fff;font-family:var(--font-mono);font-size:.85rem;padding:6px 8px;text-align:right;outline:none}
.grand-total-input:focus{border-color:var(--accent)}
.grand-total-positive{color:#2a8c57}
.grand-total-negative{color:#c82a2a}

/* SECTION */
.section{background:var(--surface);border-radius:10px;overflow:visible;box-shadow:var(--shadow);border:1px solid var(--border);width:100%;flex:0 0 auto;min-height:fit-content}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;color:#fff;border-radius:10px 10px 0 0}
.section-header.cash{background:var(--cash-hdr)}
.section-header.debit{background:var(--debit-hdr)}
.section-title{font-family:var(--font-serif);font-size:1rem;font-weight:600;letter-spacing:.03em}
.section-total{font-family:var(--font-mono);font-size:.9rem;font-weight:500;opacity:.9}

/* TABLE */
.budget-table{width:100%;border-collapse:collapse;font-size:.8rem}
.budget-table thead th{background:var(--bg);color:var(--tx-muted);font-weight:500;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.budget-table thead th.num{text-align:right}
.budget-table tbody tr{border-bottom:1px solid var(--border);transition:background .1s;position:relative}
.budget-table tbody tr:last-child{border-bottom:none}
.budget-table tbody tr:hover{background:var(--row-hover)}
.budget-table tbody tr.drag-over{background:var(--accent-lt);outline:2px dashed var(--accent)}
.budget-table tbody tr.dragging{opacity:.4}
.budget-table td{padding:0;vertical-align:middle}
.budget-table td.actions-col{width:36px;text-align:center;padding:0 4px}
.budget-table tfoot .cash-summary-row td{padding:11px 12px;border-top:2px solid var(--border);background:var(--bg);font-size:.78rem;color:var(--tx);text-align:right;font-family:var(--font-mono)}
.cash-summary-denom-label{display:block;font-size:.62rem;color:var(--tx-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-bottom:2px}
.cash-summary-denom-count{display:block;font-size:.85rem;font-weight:600;color:var(--tx)}
.budget-table tfoot .cash-summary-row .cash-summary-label{border-top:2px solid var(--border);text-align:left;font-weight:600;color:var(--tx-muted);text-transform:uppercase;letter-spacing:.08em}

/* ROW MISMATCH */
.budget-table tbody tr.bill-mismatch{background:#fff0f0!important}
.budget-table tbody tr.bill-mismatch td{color:#c82a2a}
.budget-table tbody tr.bill-mismatch:hover{background:#ffe4e4!important}
.mismatch-badge{font-size:.65rem;background:#c82a2a;color:#fff;border-radius:3px;padding:1px 4px;margin-left:4px;vertical-align:middle;white-space:nowrap}

/* CELL INPUT */
.cell-input{width:100%;border:none;outline:none;background:transparent;font-family:var(--font-mono);font-size:.8rem;color:var(--tx);padding:10px 12px;transition:background .1s}
.cell-input:focus{background:var(--accent-lt);border-radius:3px}
.cell-input.num{text-align:right}
input[type="date"].cell-input{color-scheme:light;font-family:var(--font-mono);font-size:.8rem;cursor:pointer;min-width:130px}
.btn-delete-row{background:none;border:none;color:var(--border);cursor:pointer;font-size:1rem;line-height:1;padding:4px;transition:color .12s;display:flex;align-items:center;justify-content:center}
.budget-table tbody tr:hover .btn-delete-row{color:#c82a2a}
.table-footer{padding:10px 16px;border-top:1px solid var(--border);background:var(--bg);border-radius:0 0 10px 10px}
.btn-add-row{background:none;border:1px dashed var(--border);color:var(--tx-muted);border-radius:var(--radius);padding:6px 14px;font-family:var(--font-mono);font-size:.73rem;cursor:pointer;transition:all .12s;letter-spacing:.03em}
.btn-add-row:hover{border-color:var(--accent);color:var(--accent)}
.mobile-table-wrap{
  overflow-x:auto;
  overflow-y:hidden;
  /* overscroll-behavior:contain */
}

/* DRAG HANDLE */
.drag-handle{cursor:grab;color:var(--border);padding:0 4px 0 8px;font-size:1rem;user-select:none;display:flex;align-items:center;opacity:0;transition:opacity .1s}
.budget-table tbody tr:hover .drag-handle{opacity:1}
.drag-handle:active{cursor:grabbing}

/* ROW CONTEXT MENU (3-dot) */
.row-menu-btn{background:none;border:none;color:var(--border);cursor:pointer;padding:4px 6px;font-size:1rem;line-height:1;border-radius:3px;transition:color .12s,background .12s;display:flex;align-items:center;justify-content:center}
.budget-table tbody tr:hover .row-menu-btn{color:var(--tx-muted)}
.row-menu-btn:hover{background:var(--bg);color:var(--tx)!important}

/* DROPDOWN MENU */
.dropdown-menu{position:fixed;z-index:500;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 6px 24px rgba(0,0,0,.14);padding:5px;min-width:180px;display:flex;flex-direction:column;gap:2px;animation:fadeIn .1s ease}
.dropdown-item{background:none;border:none;width:100%;text-align:left;padding:8px 12px;font-family:var(--font-mono);font-size:.78rem;color:var(--tx);cursor:pointer;border-radius:4px;transition:background .1s;display:flex;align-items:center;gap:8px}
.dropdown-item:hover{background:var(--bg)}
.dropdown-item.danger{color:#c82a2a}
.dropdown-item.danger:hover{background:#fff0f0}
.dropdown-sep{height:1px;background:var(--border);margin:3px 0}

/* NOTES */
.debit-notes-input{width:100%;border:none;outline:none;background:transparent;font-family:var(--font-mono);font-size:.75rem;color:var(--tx-muted);padding:6px 12px 8px;resize:none;transition:background .1s;min-height:26px;display:block;overflow:hidden}
.debit-notes-input:focus{background:var(--accent-lt);color:var(--tx);border-radius:0 0 0 0}
.debit-notes-input::placeholder{color:var(--border)}
td.notes-cell{padding:0;border-top:none}

/* EMPTY / SPINNER */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--tx-muted);gap:12px;font-size:.85rem}
#empty-state h3{font-family:var(--font-serif);font-size:1.5rem;font-weight:300;font-style:italic;color:var(--tx)}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--surface);border-radius:10px;padding:28px 32px;box-shadow:0 8px 32px rgba(0,0,0,.18);min-width:320px;max-width:420px;width:90%}
.modal-box h3{font-family:var(--font-serif);font-size:1.1rem;font-weight:600;margin-bottom:14px}
.modal-box p{font-size:.82rem;color:var(--tx-muted);margin-bottom:18px;line-height:1.6}
.modal-box input{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-family:var(--font-mono);font-size:.85rem;outline:none;margin-bottom:18px;transition:border-color .12s}
.modal-box input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--tx-muted);border-radius:var(--radius);padding:8px 18px;font-family:var(--font-mono);font-size:.78rem;cursor:pointer;transition:all .12s}
.btn-cancel:hover{border-color:var(--tx-muted);color:var(--tx)}
.btn-confirm{background:var(--accent);border:none;color:#fff;border-radius:var(--radius);padding:8px 18px;font-family:var(--font-mono);font-size:.78rem;cursor:pointer;transition:opacity .12s}
.btn-confirm:hover{opacity:.85}
.btn-confirm.danger{background:#c82a2a}
.btn-confirm.success{background:#2a8c57}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* RESPONSIVE */
@media(max-width:960px){
  body{overflow:auto;overscroll-behavior:contain}
  #app{height:auto;min-height:100vh;overflow:visible}
  #sidebar{position:fixed;top:0;bottom:0;left:-110%;z-index:100;transition:left .25s ease;width:min(86vw,320px);min-width:0;box-shadow:0 12px 40px rgba(0,0,0,.22)}
  #sidebar.open{left:0}
  body.menu-open{overflow:hidden}
  #main{width:100%;height:auto;min-height:100vh}
  #toolbar{padding:12px 14px;gap:8px}

  .toolbar-spacer{display:none}

  .status-indicator{width:100%;justify-content:flex-start;font-size:.72rem}
  #editor{padding:18px 14px 48px;gap:12px}
  .section-header{flex-direction:column;align-items:flex-start;gap:4px;padding:10px 12px 9px}
  .cell-input{padding:12px 8px;min-height:44px}
  .grand-total-grid{padding:12px;gap:8px}
  .grand-total-group{flex-direction:column}

  #cash-table{display:block;width:100%}
  #cash-table thead{display:none}
  #cash-table tbody{display:flex;flex-direction:column;gap:8px;width:100%}
  #cash-table tbody tr{display:flex;flex-wrap:wrap;align-items:center;gap:3px 8px;padding:6px 8px;border-bottom:1px solid var(--border);background:var(--surface);width:100%;box-sizing:border-box}
  #cash-table tbody tr td{display:flex;flex-direction:row;align-items:center;gap:5px;padding:0;min-width:0}

  #cash-table tbody tr td.name-col::before,#cash-table tbody tr td.actions-col::before,#cash-table tbody tr td.drag-col::before{content:'';display:none}
  #cash-table tbody tr td.drag-col{order:1;flex:0 0 0;width:0;opacity:0;pointer-events:none;overflow:hidden;justify-content:center;transition:flex-basis .2s ease,width .2s ease,opacity .2s ease}
  #editor.reorder-mode #cash-table tbody tr td.drag-col{flex:0 0 24px;width:24px;opacity:1;pointer-events:auto}
  #cash-table tbody tr td.name-col{order:2;flex:1 1 auto;min-width:0}
  #cash-table tbody tr td.actions-col{order:3;flex:0 0 32px;width:32px;justify-content:center}
  #cash-table tbody tr td.total-col{order:4;flex:1 1 100%;justify-content:space-between}
  #cash-table tbody tr td.bill-col{order:5;flex:0 0 auto;min-width:0;gap:3px;margin-right:11px;background:var(--bg);border-radius:5px;padding:3px 6px 3px 7px}
  #cash-table tbody tr td.bill-col::before{color:var(--tx-muted);font-size:.62rem}
  #cash-table tbody tr td.total-col .cell-input{flex:1 1 auto;min-width:0;width:auto;min-height:26px;padding:3px 2px}
  #cash-table tbody tr td.bill-col .cell-input{flex:0 0 auto;width:16px;min-width:0;min-height:20px;padding:0;text-align:left}
  #cash-table .cell-input{min-height:34px;padding:6px 6px}
  .mobile-menu-btn{display:inline-flex!important}
  .budget-item-menu-btn{display:block!important}
  .drag-handle{opacity:1}
}
</style>

<body>

    <button class="google-btn" id="sign-in-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>

        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>

      Sign in with Google

</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-row">
        <div><h2><span style="color:var(--accent)">$</span> BudgetDesk</h2><div class="user-email" id="user-email"></div></div>
        <button class="sidebar-close-btn" id="sidebar-close-btn">×</button>
      </div>
    </div>
    <div class="sidebar-actions"><button class="btn-new" id="btn-new-budget">+ New Budget</button></div>
    <div class="sidebar-search"><input type="text" id="search-input" placeholder="Search budgets…" /></div>

        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><rect y="3" width="20" height="2" rx="1"/><rect y="9" width="20" height="2" rx="1"/><rect y="15" width="20" height="2" rx="1"/></svg>

    </div>
    <div id="editor"><div id="empty-state"><div class="spinner"></div><span>Loading…</span></div></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal-box">
    <h3 id="modal-title">Action</h3>
    <p id="modal-body" style="display:none"></p>
    <input type="text" id="modal-input" placeholder="" />
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-confirm" id="modal-confirm">OK</button>
    </div>
  </div>
</div>

<script>
// ─── Firebase Config ──────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBncHYW148kkZ_Hkplj_Y76Z6RzgUGf_5w",
  authDomain: "fir-flutter-codelab-29a1c.firebaseapp.com",
  projectId: "fir-flutter-codelab-29a1c",
  storageBucket: "fir-flutter-codelab-29a1c.firebasestorage.app",
  messagingSenderId: "749425165857",
  appId: "1:749425165857:web:36d8873344bfd412f50560"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ─── Defaults ─────────────────────────────────────────────────
const DEFAULT_CASH_ITEMS = [
  { name:"Grocery",total:450,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Animal",total:50,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Entertainment",total:80,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Graham's Spending Money",total:50,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Maddy's Spending Money",total:50,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Date Night",total:50,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Discretionary Spending",total:50,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Car Insurance",total:70,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Fun Savings",total:50,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Gifts",total:40,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Car (Maintenance)",total:50,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Home Improvement",total:50,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Donation",total:50,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Baby",total:100,d100:0,d50:0,d20:0,d10:0,d5:0 },
  { name:"Maternity Leave",total:300,d100:0,d50:0,d20:0,d10:0,d5:0 },
];
const DEFAULT_DEBIT_ITEMS = [
  { name:"Mortgage",total:945,date:"",included:true,notes:"" },
  { name:"Electric & Gas",total:0,date:"",included:true,notes:"" },
  { name:"Water & Sewer",total:0,date:"",included:true,notes:"" },
  { name:"Home Insurance",total:145,date:"",included:true,notes:"" },
  { name:"Life Insurance",total:125,date:"",included:true,notes:"" },
  { name:"Student Loans",total:0,date:"",included:true,notes:"" },
  { name:"Car Loan",total:155,date:"",included:true,notes:"" },
  { name:"Retirement",total:250,date:"",included:true,notes:"" },
  { name:"Donations",total:0,date:"",included:true,notes:"" },
  { name:"Savings",total:0,date:"",included:true,notes:"" },
  { name:"Subscriptions",total:0,date:"",included:true,notes:"" },
  { name:"Therapy",total:0,date:"",included:true,notes:"" },
  { name:"Internet",total:100,date:"",included:true,notes:"" },
  { name:"Phone",total:125,date:"",included:true,notes:"" },
  { name:"Gas",total:175,date:"",included:true,notes:"" },
  { name:"Debt",total:475,date:"",included:true,notes:"" },
];

// ─── State ────────────────────────────────────────────────────
let currentUser = null, budgets = [], currentBudget = null;
let saveTimer = null, listUnsub = null;
let dragSrcIdx = null, dragSection = null;

// ─── Auth ─────────────────────────────────────────────────────
document.getElementById('sign-in-btn').onclick = () =>
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => alert('Sign-in failed: '+e.message));
document.getElementById('btn-signout').onclick = () => auth.signOut();

auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('user-email').textContent = user.email;
    loadBudgetList();
  } else {
    currentUser = null;
    document.getElementById('login-screen').classList.remove('hidden');
    if (listUnsub) { listUnsub(); listUnsub = null; }
    renderBudgetList([]); showEmpty(); currentBudget = null;
  }
});

// ─── Budget List ──────────────────────────────────────────────
function budgetsCol() { return db.collection('users').doc(currentUser.uid).collection('budgets'); }

function loadBudgetList() {
  if (!currentUser) return;
  if (listUnsub) listUnsub();
  listUnsub = budgetsCol().orderBy('updatedAt','desc').onSnapshot(snap => {
    budgets = snap.docs.map(d => ({ id:d.id, name:d.data().name, updatedAt:d.data().updatedAt, locked:d.data().locked||false, complete:d.data().complete||false }));
    renderBudgetList(budgets);
    if (!budgets.length) createDefaultBudget();
    else if (!currentBudget) loadBudget(budgets[0].id);
  }, console.error);
}

function renderBudgetList(list) {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = q ? list.filter(b => b.name.toLowerCase().includes(q)) : list;
  const el = document.getElementById('budget-list');
  el.innerHTML = '';
  filtered.forEach(b => {
    const item = document.createElement('div');
    item.className = 'budget-item' + (currentBudget && currentBudget.id === b.id ? ' active' : '');
    const upd = b.updatedAt ? formatDate(b.updatedAt.toDate ? b.updatedAt.toDate() : new Date(b.updatedAt)) : '';
    const statusDot = b.complete ? ' 🔒' : b.locked ? ' 🔒' : '';
    item.innerHTML = `
      <div class="budget-item-info">
        <div class="budget-item-name">${escHtml(b.name)}${statusDot}</div>
        <div class="budget-item-date">${upd}</div>
      </div>
      <button class="budget-item-menu-btn" data-id="${b.id}" title="Options">⋯</button>`;
    item.querySelector('.budget-item-menu-btn').onclick = e => { e.stopPropagation(); showBudgetItemMenu(e, b); };
    item.addEventListener('click', () => switchBudget(b.id));
    el.appendChild(item);
  });
}
document.getElementById('search-input').oninput = () => renderBudgetList(budgets);

// ─── CRUD ─────────────────────────────────────────────────────
function getTodayString() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

async function createDefaultBudget() {
  const ref = await budgetsCol().add({
    name:"My First Budget", createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt:firebase.firestore.FieldValue.serverTimestamp(), locked:false, complete:false,
    data:{ cashItems:JSON.parse(JSON.stringify(DEFAULT_CASH_ITEMS)), debitItems:JSON.parse(JSON.stringify(DEFAULT_DEBIT_ITEMS)).map(i=>({...i,date:getTodayString()})), checkingBalance:0, rentIncome:0 }
  });
  loadBudget(ref.id);
}

async function createNewBudget() {
  const name = prompt('Budget name:','New Budget')||'New Budget';
  const ref = await budgetsCol().add({
    name, createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt:firebase.firestore.FieldValue.serverTimestamp(), locked:false, complete:false,
    data:{ cashItems:JSON.parse(JSON.stringify(DEFAULT_CASH_ITEMS)), debitItems:JSON.parse(JSON.stringify(DEFAULT_DEBIT_ITEMS)).map(i=>({...i,date:getTodayString()})), checkingBalance:0, rentIncome:0 }
  });
  closeMobileMenu(); loadBudget(ref.id);
}

async function loadBudget(id) {
  if (saveTimer) { clearTimeout(saveTimer); await flushSave(); }
  setStatus('loading');
  const doc = await budgetsCol().doc(id).get();
  if (!doc.exists) return;
  currentBudget = { id:doc.id, ...doc.data() };
  currentBudget.data = currentBudget.data || {};
  currentBudget.data.checkingBalance = parseNum(currentBudget.data.checkingBalance ?? 0);
  currentBudget.data.rentIncome = parseNum(currentBudget.data.rentIncome ?? 0);
  // Ensure notes field on debit items
  (currentBudget.data.debitItems||[]).forEach(i => { if(i.notes===undefined) i.notes=''; });
  setReorderMode(false);
  document.getElementById('budget-name-input').value = currentBudget.name || '';
  renderEditor(currentBudget.data);
  updateLockUI();
  renderBudgetList(budgets);
  setStatus('saved');
}

async function switchBudget(id) {
  if (currentBudget && currentBudget.id === id) return;
  if (saveTimer) { clearTimeout(saveTimer); await flushSave(); }
  closeMobileMenu(); loadBudget(id);
}

async function deleteBudget(id) {
  await budgetsCol().doc(id).delete();
  if (currentBudget && currentBudget.id === id) { currentBudget=null; showEmpty(); updateLockUI(); }
}

async function renameBudget(id, name) {
  await budgetsCol().doc(id).update({ name, updatedAt:firebase.firestore.FieldValue.serverTimestamp() });
  if (currentBudget && currentBudget.id === id) { currentBudget.name=name; document.getElementById('budget-name-input').value=name; }
}

async function duplicateBudget() {
  if (!currentBudget) return;
  if (saveTimer) { clearTimeout(saveTimer); await flushSave(); }
  const ref = await budgetsCol().add({
    name:currentBudget.name+' (copy)', createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt:firebase.firestore.FieldValue.serverTimestamp(), locked:false, complete:false,
    data:JSON.parse(JSON.stringify(currentBudget.data))
  });
  closeMobileMenu(); loadBudget(ref.id);
}

async function setLockState(locked, complete) {
  if (!currentBudget) return;
  currentBudget.locked = locked;
  currentBudget.complete = complete;
  await budgetsCol().doc(currentBudget.id).update({ locked, complete, updatedAt:firebase.firestore.FieldValue.serverTimestamp() });
  updateLockUI();
  renderEditor(currentBudget.data);
  renderBudgetList(budgets);
}

function updateLockUI() {
  const badge = document.getElementById('lock-badge');
  const nameInp = document.getElementById('budget-name-input');
  if (!currentBudget) { badge.style.display='none'; return; }
  badge.style.display = 'inline-flex';
  if (currentBudget.complete) {
    badge.className='lock-badge complete'; badge.textContent='✓ Complete';
  } else if (currentBudget.locked) {
    badge.className='lock-badge locked'; badge.textContent='🔒 Locked';
  } else {
    badge.className='lock-badge editable'; badge.textContent='● Editable';
  }
  const isLocked = currentBudget.locked || currentBudget.complete;
  nameInp.disabled = isLocked;
  document.getElementById('editor').classList.toggle('locked-mode', isLocked);
}

// ─── Autosave ─────────────────────────────────────────────────
function scheduleSave() {
  if (!currentBudget) return;
  if (currentBudget.locked || currentBudget.complete) return;
  setStatus('saving');
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 1400);
}

async function flushSave() {
  saveTimer = null;
  if (!currentBudget) return;
  try {
    await budgetsCol().doc(currentBudget.id).update({ name:currentBudget.name, updatedAt:firebase.firestore.FieldValue.serverTimestamp(), data:currentBudget.data });
    setStatus('saved');
  } catch(e) { setStatus('error'); console.error(e); }
}

function setStatus(s) {
  const el = document.getElementById('status-indicator');
  el.className = 'status-indicator '+s;
  el.textContent = s==='saving'?'● Saving…':s==='saved'?'✓ Saved':s==='error'?'✕ Error':s==='loading'?'…':'—';
}

// ─── Toolbar / menu ───────────────────────────────────────────
document.getElementById('btn-new-budget').onclick = createNewBudget;
document.getElementById('budget-name-input').oninput = e => { if(!currentBudget) return; currentBudget.name=e.target.value; scheduleSave(); };

document.getElementById('btn-budget-options').onclick = e => {
  if (!currentBudget) return;
  const isLocked = currentBudget.locked || currentBudget.complete;
  const items = [
    { label:'📋 Duplicate Budget', action: duplicateBudget },
    { label:'📤 Export PNG', action: () => runExport('png') },
    { label:'📄 Export PDF', action: () => runExport('pdf') },
    { sep: true },
    { label:'✎ Rename Budget', action: () => showModal('Rename Budget','',currentBudget.name,'Rename','',val=>{ if(val) renameBudget(currentBudget.id,val); }) },
    { label:'🗑 Delete Budget', cls:'danger', action: () => showModal('Delete Budget','Are you sure you want to delete "'+currentBudget.name+'"? This cannot be undone.','','Delete','danger',()=>deleteBudget(currentBudget.id)) },
    { sep: true },
    isLocked
      ? { label:'🔓 Unlock Budget', action: () => setLockState(false, false) }
      : { label:'🔒 Mark Complete / Lock', action: () => showModal('Lock Budget','Mark this budget as complete? All editing will be disabled until you unlock it.','','Mark Complete','success',()=>setLockState(true,true)) }
  ];
  showDropdown(e.currentTarget, items);
};

// ─── Mobile menu ──────────────────────────────────────────────

function showBudgetItemMenu(e, b) {
  const isLocked = b.locked || b.complete;
  const items = [
    { label:'✎ Rename', action: () => showModal('Rename Budget', '', b.name, 'Rename', '', val => { if(val) renameBudget(b.id, val); }) },
    { label:'📋 Duplicate', action: async () => {
        if (saveTimer) { clearTimeout(saveTimer); await flushSave(); }
        const doc = await budgetsCol().doc(b.id).get();
        if (!doc.exists) return;
        const ref = await budgetsCol().add({ name:b.name+' (copy)', createdAt:firebase.firestore.FieldValue.serverTimestamp(), updatedAt:firebase.firestore.FieldValue.serverTimestamp(), locked:false, complete:false, data:JSON.parse(JSON.stringify(doc.data().data||{})) });
        loadBudget(ref.id);
    }},
    { sep: true },
    isLocked
      ? { label:'🔓 Unlock', action: async () => { await budgetsCol().doc(b.id).update({ locked:false, complete:false }); if(currentBudget&&currentBudget.id===b.id){ currentBudget.locked=false; currentBudget.complete=false; updateLockUI(); renderEditor(currentBudget.data); } } }
      : { label:'🔒 Lock', action: () => { budgetsCol().doc(b.id).update({ locked:true, complete:true }); if(currentBudget&&currentBudget.id===b.id){ currentBudget.locked=true; currentBudget.complete=true; updateLockUI(); renderEditor(currentBudget.data); } } },
    { sep: true },
    { label:'🗑 Delete', cls:'danger', action: () => showModal('Delete "'+b.name+'"?', 'This cannot be undone.', '', 'Delete', 'danger', () => deleteBudget(b.id)) }
  ];
  showDropdown(e.currentTarget, items);
}

// ─── Dropdown helper ──────────────────────────────────────────
function showDropdown(anchor, items) {
  closeAllDropdowns();
  const menu = document.createElement('div');
  menu.className = 'dropdown-menu';
  menu.id = '__active-dropdown';
  items.forEach(it => {
    if (it.sep) { const s=document.createElement('div'); s.className='dropdown-sep'; menu.appendChild(s); return; }
    const btn = document.createElement('button');
    btn.className = 'dropdown-item' + (it.cls?' '+it.cls:'');
    btn.textContent = it.label;
    btn.onclick = () => { closeAllDropdowns(); it.action(); };
    menu.appendChild(btn);
  });
  document.body.appendChild(menu);
  const r = anchor.getBoundingClientRect();
  let top = r.bottom + 6, left = r.left;
  if (left + 200 > window.innerWidth) left = r.right - 200;
  if (top + 300 > window.innerHeight) top = r.top - menu.offsetHeight - 6;
  menu.style.top = top+'px'; menu.style.left = left+'px';
  setTimeout(() => document.addEventListener('click', closeAllDropdowns, { once:true }), 0);
}
function closeAllDropdowns() { document.getElementById('__active-dropdown')?.remove(); }

// ─── Grand Total Panel ────────────────────────────────────────
function getCheckingBalance() { return !currentBudget?0:parseNum(currentBudget.data.checkingBalance??0); }
function getRentIncome()      { return !currentBudget?0:parseNum(currentBudget.data.rentIncome??0); }
function getCashTotalValue()  { return !currentBudget?0:currentBudget.data.cashItems.reduce((s,i)=>s+parseNum(i.total),0); }
function getDebitTotalValue() { return !currentBudget?0:currentBudget.data.debitItems.reduce((s,i)=>s+(i.included===false?0:parseNum(i.total)),0); }

function buildGrandTotalPanel() {
  const panel = document.createElement('div');
  panel.className = 'grand-total-panel';
  panel.innerHTML = `
    <div class="grand-total-header"><div class="grand-total-title">TOTAL</div></div>
    <div class="grand-total-grid">
      <div class="grand-total-group">
        <div class="grand-total-row"><span>Checking Account</span><input id="gt-checking-input" class="grand-total-input" type="text" inputmode="decimal" /></div>
        <div class="grand-total-row"><span>Rent Income</span><input id="gt-rent-input" class="grand-total-input" type="text" inputmode="decimal" /></div>
      </div>
      <div class="grand-total-group">
        <div class="grand-total-row"><span>Available</span><strong id="gt-available">$0</strong></div>
        <div class="grand-total-row"><span>Cash</span><strong id="gt-cash">$0</strong></div>
        <div class="grand-total-row"><span>Debit</span><strong id="gt-debit">$0</strong></div>
        <div class="grand-total-row"><span>Combined</span><strong id="gt-combined">$0</strong></div>
      </div>
      <div class="grand-total-group">
        <div id="gt-surplus-row" class="grand-total-row"><span>Surplus / Deficit</span><strong id="gt-surplus">$0</strong></div>
        <div id="gt-percent-row" class="grand-total-row"><span>Coverage %</span><strong id="gt-percent">0%</strong></div>
      </div>
    </div>`;

  const checkInp = panel.querySelector('#gt-checking-input');
  const rentInp  = panel.querySelector('#gt-rent-input');
  checkInp.value = formatMoney(getCheckingBalance());
  rentInp.value  = formatMoney(getRentIncome());

  function wireInput(inp, setter) {
    inp.onfocus = () => { const v=parseNum(inp.value); inp.value = v===0?'':String(v); };
    inp.onblur  = () => { const v=parseNum(inp.value); inp.value=formatMoney(v); setter(v); updateGrandTotal(panel); scheduleSave(); };
    inp.oninput = () => { setter(parseNum(inp.value)); updateGrandTotal(panel); scheduleSave(); };
  }
  wireInput(checkInp, v => { currentBudget.data.checkingBalance = v; });
  wireInput(rentInp,  v => { currentBudget.data.rentIncome = v; });
  updateGrandTotal(panel);
  return panel;
}

function updateGrandTotal(panel = document.querySelector('.grand-total-panel')) {
  if (!panel||!currentBudget||!currentBudget.data) return;
  const cash     = getCashTotalValue();
  const debit    = getDebitTotalValue();
  const combined = cash + debit;
  const checking = getCheckingBalance();
  const rent     = getRentIncome();
  const available= checking + rent;
  const surplus  = available - combined;
  const pct      = combined===0?100:(available/combined)*100;

  panel.querySelector('#gt-available').textContent = formatMoney(available);
  panel.querySelector('#gt-cash').textContent      = formatMoney(cash);
  panel.querySelector('#gt-debit').textContent     = formatMoney(debit);
  panel.querySelector('#gt-combined').textContent  = formatMoney(combined);
  panel.querySelector('#gt-surplus').textContent   = formatMoney(surplus);
  panel.querySelector('#gt-percent').textContent   = pct.toFixed(1)+'%';

  const surplusRow = panel.querySelector('#gt-surplus-row');
  const pctRow     = panel.querySelector('#gt-percent-row');
  [surplusRow, pctRow].forEach(r => r&&r.classList.remove('positive','negative'));
  surplusRow&&surplusRow.classList.add(surplus>=0?'positive':'negative');
  pctRow&&pctRow.classList.add(pct>=100?'positive':'negative');
}

function buildCashRow(item, idx) {
  const tr = document.createElement('tr');
  tr.dataset.idx = idx; tr.draggable = false;

  // Drag handle
  const tdDrag = document.createElement('td');
  tdDrag.className = 'drag-col actions-col'; tdDrag.dataset.label='';
  const handle = document.createElement('span');
  handle.className = 'drag-handle'; handle.textContent = '⠿'; handle.title = 'Drag to reorder';
  tdDrag.appendChild(handle); tr.appendChild(tdDrag);

  const fields = [
    {key:'name', label:'Item',  cls:'',    type:'text'},
    {key:'total',label:'Total', cls:'num', type:'currency'},
    {key:'d100', label:'$100',  cls:'num', type:'count'},
    {key:'d50',  label:'$50',   cls:'num', type:'count'},
    {key:'d20',  label:'$20',   cls:'num', type:'count'},
    {key:'d10',  label:'$10',   cls:'num', type:'count'},
    {key:'d5',   label:'$5',    cls:'num', type:'count'},
  ];
  fields.forEach(f => {
    const td = document.createElement('td'); td.dataset.label = f.label;
    td.className = f.key==='name' ? 'name-col' : (f.key==='total' ? 'total-col' : 'bill-col');
    const inp = document.createElement('input');
    inp.className = 'cell-input '+f.cls; inp.type = 'text';
    inp.inputMode = f.key==='name'?'text':(f.type==='currency'?'decimal':'numeric');
    inp.value = f.key==='name'?(item[f.key]||''):(f.type==='currency'?formatMoney(item[f.key]||0):formatBillCount(item[f.key]||0));
    inp.placeholder = f.key==='name'?'Item name…':(f.type==='currency'?'$0':'0');
    if (f.key==='name') {
      inp.oninput = () => { const i=currentBudget.data.cashItems[tr.dataset.idx]; if(i) { i.name=inp.value; scheduleSave(); } };
    } else if (f.type==='currency') {
      inp.onfocus = () => { const v=parseNum(inp.value); inp.value=v===0?'':String(v); };
      inp.onblur  = () => { const v=parseNum(inp.value); inp.value=formatMoney(v); const i=currentBudget.data.cashItems[tr.dataset.idx]; if(i){i.total=v;} updateCashTotal(); checkCashMismatch(tr); scheduleSave(); };
      inp.oninput = () => { const i=currentBudget.data.cashItems[tr.dataset.idx]; if(i){i.total=parseNum(inp.value);} updateCashTotal(); scheduleSave(); };
    } else {
      inp.onfocus = () => { const v=parseBillCount(inp.value); inp.value=v===0?'':String(v); };
      inp.onblur  = () => { const v=parseBillCount(inp.value); inp.value=formatBillCount(v); const i=currentBudget.data.cashItems[tr.dataset.idx]; if(i){i[f.key]=v;} updateCashBillSummary(); checkCashMismatch(tr); scheduleSave(); };
      inp.oninput = () => { const i=currentBudget.data.cashItems[tr.dataset.idx]; if(i){i[f.key]=parseBillCount(inp.value);} updateCashBillSummary(); scheduleSave(); };
    }
    td.appendChild(inp); tr.appendChild(td);
  });

  // Actions cell (row menu + delete)
  const tdAct = document.createElement('td'); tdAct.className = 'actions-col'; tdAct.style.width='58px';
  const menuBtn = document.createElement('button');
  menuBtn.className = 'row-menu-btn'; menuBtn.textContent = '⋯'; menuBtn.title = 'Options';
  menuBtn.onclick = e => showRowMenu(e, 'cash', parseInt(tr.dataset.idx));
  // const delBtn = document.createElement('button');
  // delBtn.className = 'btn-delete-row'; delBtn.innerHTML = '×'; delBtn.title = 'Remove row';
  // delBtn.onclick = () => { const i=parseInt(tr.dataset.idx); currentBudget.data.cashItems.splice(i,1); tr.remove(); reindexRows('#cash-tbody'); updateCashTotal(); updateCashBillSummary(); scheduleSave(); };
  tdAct.appendChild(menuBtn);
  //  tdAct.appendChild(delBtn); 
   tr.appendChild(tdAct);

  checkCashMismatch(tr, item);
  return tr;
}

function checkCashMismatch(tr, itemOverride) {
  const idx = parseInt(tr.dataset.idx);
  const item = itemOverride || currentBudget.data.cashItems[idx];
  if (!item) return;
  const billTotal = (parseBillCount(item.d100)*100) + (parseBillCount(item.d50)*50) + (parseBillCount(item.d20)*20) + (parseBillCount(item.d10)*10) + (parseBillCount(item.d5)*5);
  const hasBreakdown = (parseBillCount(item.d100)+parseBillCount(item.d50)+parseBillCount(item.d20)+parseBillCount(item.d10)+parseBillCount(item.d5)) > 0;
  const mismatch = hasBreakdown && billTotal !== parseNum(item.total);
  tr.classList.toggle('bill-mismatch', mismatch);
  // Update or remove mismatch badge on name cell
  const nameCell = tr.querySelector('td:nth-child(2)');
  let badge = nameCell && nameCell.querySelector('.mismatch-badge');
  if (mismatch) {
    if (!badge && nameCell) { badge=document.createElement('span'); badge.className='mismatch-badge'; badge.title='Bill breakdown doesn\'t match total'; badge.textContent='≠'; nameCell.querySelector('input').after(badge); }
  } else if (badge) { badge.remove(); }
}

function updateCashTotal() { const t=getCashTotalValue(); const el=document.getElementById('cash-total'); if(el)el.textContent='$'+fmt(t); updateGrandTotal(); }
function updateCashBillSummary(section=document.getElementById('cash-section')) {
  if (!section||!currentBudget) return;
  const s = currentBudget.data.cashItems.reduce((a,i)=>{ a.d100+=parseBillCount(i.d100); a.d50+=parseBillCount(i.d50); a.d20+=parseBillCount(i.d20); a.d10+=parseBillCount(i.d10); a.d5+=parseBillCount(i.d5); return a; },{d100:0,d50:0,d20:0,d10:0,d5:0});
  ['d100','d50','d20','d10','d5'].forEach(k=>{ const el=section.querySelector('#cash-summary-'+k); if(el){ const count=el.querySelector('.cash-summary-denom-count'); if(count)count.textContent=formatBillCount(s[k]); else el.textContent=formatBillCount(s[k]); } });
  // Re-check all rows for mismatches
  section.querySelectorAll('#cash-tbody tr').forEach(tr=>checkCashMismatch(tr));
}

let reorderMode = false;
function setReorderMode(active) {
  reorderMode = active;
  document.getElementById('editor')?.classList.toggle('reorder-mode', active);
}

function showRowMenu(e, section, idx) {
  e.stopPropagation();
  const items = [
    { label: reorderMode ? '✓ Done Rearranging' : '↕ Rearrange Rows', action: () => setReorderMode(!reorderMode) },
    { sep:true },
    section==='cash'
      ? { label:'→ Move to Debit', action:()=>moveRow('cash','debit',idx) }
      : { label:'→ Move to Cash',  action:()=>moveRow('debit','cash',idx) },
    { sep:true },
    { label:'🗑 Delete Row', cls:'danger', action:()=>{
        if (section==='cash') {
          currentBudget.data.cashItems.splice(idx,1);
          reindexRows('#cash-tbody');
          document.querySelectorAll('#cash-tbody tr')[idx]?.remove() || renderEditor(currentBudget.data);
          updateCashTotal(); updateCashBillSummary(); scheduleSave();
          renderEditor(currentBudget.data);
        } else {
          currentBudget.data.debitItems.splice(idx,1);
          renderEditor(currentBudget.data);
          updateDebitTotal(); scheduleSave();
        }
      }
    }
  ];
  showDropdown(e.currentTarget, items);
}

function moveRow(fromSection, toSection, idx) {
  const fromKey = fromSection==='cash'?'cashItems':'debitItems';
  const toKey   = toSection==='cash'?'cashItems':'debitItems';
  const row = currentBudget.data[fromKey].splice(idx, 1)[0];
  if (!row) return;
  // Normalise shape
  if (toSection==='cash'&&row.d100===undefined) { row.d100=0;row.d50=0;row.d20=0;row.d10=0;row.d5=0; delete row.date; delete row.notes; }
  if (toSection==='debit'&&row.date===undefined) { row.date='';row.notes='';row.included=true; delete row.d100;delete row.d50;delete row.d20;delete row.d10;delete row.d5; }
  currentBudget.data[toKey].push(row);
  renderEditor(currentBudget.data);
  scheduleSave();
}

// ─── Drag & Drop ──────────────────────────────────────────────
function initDragSection(tbody, section) {
  // Only arm native HTML5 drag when the press starts on the handle.
  tbody.addEventListener('mousedown', e => {
    if (!e.target.closest('.drag-handle')) return;
    const tr = e.target.closest('tr'); if (!tr) return;
    tr.draggable = true;
  });
  const disarm = () => { tbody.querySelectorAll('tr[draggable="true"]').forEach(r => r.draggable = false); };
  tbody.addEventListener('mouseup', disarm);
  document.addEventListener('mouseup', disarm);
  tbody.addEventListener('dragstart', e => {
    const tr = e.target.closest('tr'); if (!tr) return;
    if (!e.target.closest('.drag-handle')) { e.preventDefault(); return; }
    dragSrcIdx = parseInt(tr.dataset.idx); dragSection = section;
    tr.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  tbody.addEventListener('dragend', e => {
    const tr = e.target.closest('tr'); if (tr) tr.classList.remove('dragging');
    tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
    disarm();
    dragSrcIdx = null; dragSection = null;
  });
  tbody.addEventListener('dragover', e => {
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    const tr = e.target.closest('tr'); if (!tr) return;
    tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
    if (parseInt(tr.dataset.idx) !== dragSrcIdx) tr.classList.add('drag-over');
  });
  tbody.addEventListener('drop', e => {
    e.preventDefault();
    const tr = e.target.closest('tr'); if (!tr||dragSrcIdx===null) return;
    const destIdx = parseInt(tr.dataset.idx);
    if (destIdx === dragSrcIdx || dragSection !== section) return;
    const key = section==='cash'?'cashItems':'debitItems';
    const arr = currentBudget.data[key];
    const [moved] = arr.splice(dragSrcIdx, 1);
    arr.splice(destIdx, 0, moved);
    renderEditor(currentBudget.data);
    scheduleSave();
  });
  // Touch drag (basic)
  let touchItem=null, touchClone=null, touchSrcIdx=null;
  tbody.addEventListener('touchstart', e => {
    if(!e.target.closest('.drag-handle')) return;
    const tr=e.target.closest('tr'); if(!tr) return;
    touchSrcIdx=parseInt(tr.dataset.idx);
    touchItem=tr;
    touchClone=tr.cloneNode(true);
    touchClone.style.cssText='position:fixed;opacity:.7;pointer-events:none;z-index:999;width:'+tr.offsetWidth+'px;left:0;top:0;background:var(--surface)';
    document.body.appendChild(touchClone);
  },{passive:true});
  tbody.addEventListener('touchmove', e => {
    if (!touchClone) return;
    const t=e.touches[0];
    touchClone.style.left=t.clientX-50+'px'; touchClone.style.top=t.clientY-20+'px';
    const el=document.elementFromPoint(t.clientX, t.clientY);
    const overTr=el&&el.closest('tr');
    tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));
    if(overTr&&overTr!==touchItem) overTr.classList.add('drag-over');
  },{passive:true});
  tbody.addEventListener('touchend', e => {
    if(!touchClone) return;
    touchClone.remove(); touchClone=null;
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const destTr=el&&el.closest('tr');
    tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));
    if(destTr&&touchSrcIdx!==null){
      const destIdx=parseInt(destTr.dataset.idx);
      if(destIdx!==touchSrcIdx&&!isNaN(destIdx)){
        const key=section==='cash'?'cashItems':'debitItems';
        const arr=currentBudget.data[key];
        const [moved]=arr.splice(touchSrcIdx,1);
        arr.splice(destIdx,0,moved);
        renderEditor(currentBudget.data); scheduleSave();
      }
    }
    touchSrcIdx=null; touchItem=null;
  },{passive:true});
}

// ─── Helpers ──────────────────────────────────────────────────
function reindexRows(selector) { document.querySelectorAll(selector+' tr').forEach((r,i)=>r.dataset.idx=i); }

// ─── Export ───────────────────────────────────────────────────
async function runExport(format) {
  const editor=document.getElementById('editor');
  const os=editor.getAttribute('style')||'';
  editor.style.overflow='visible'; editor.style.height='auto'; editor.style.maxHeight='none';
  setStatus('saving');
  try {
    const canvas=await html2canvas(editor,{scale:2,useCORS:true,backgroundColor:'#f5f2ec',scrollY:0,windowWidth:editor.scrollWidth,windowHeight:editor.scrollHeight});
    if (format==='png') {
      const link=document.createElement('a'); link.download=(currentBudget.name||'budget')+'.png'; link.href=canvas.toDataURL('image/png'); link.click();
    } else {
      const {jsPDF}=window.jspdf; const imgData=canvas.toDataURL('image/png');
      const pw=210, ph=(canvas.height*pw)/canvas.width;
      const pdf=new jsPDF({orientation:ph>pw?'portrait':'landscape',unit:'mm',format:[pw,ph]});
      pdf.addImage(imgData,'PNG',0,0,pw,ph); pdf.save((currentBudget.name||'budget')+'.pdf');
    }
    setStatus('saved');
  } catch(e) { console.error(e); setStatus('error'); } finally { editor.setAttribute('style',os); }
}

// ─── Modal ────────────────────────────────────────────────────
let _modalCb = null;
function showModal(title, body, defaultVal, confirmLabel, confirmClass, cb) {
  document.getElementById('modal-title').textContent = title;
  const bodyEl = document.getElementById('modal-body');
  bodyEl.textContent = body; bodyEl.style.display = body?'block':'none';
  const inp = document.getElementById('modal-input');
  inp.value = defaultVal; inp.style.display = defaultVal!==null&&defaultVal!==undefined&&confirmClass!=='danger'?'block':'none';
  document.getElementById('modal-confirm').textContent = confirmLabel;
  document.getElementById('modal-confirm').className = 'btn-confirm'+(confirmClass?' '+confirmClass:'');
  document.getElementById('modal-overlay').classList.remove('hidden');
  if (inp.style.display!=='none') { inp.focus(); inp.select(); }
  _modalCb = cb;
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); _modalCb=null; }
document.getElementById('modal-cancel').onclick = closeModal;
document.getElementById('modal-confirm').onclick = () => { const v=document.getElementById('modal-input').value.trim(); if(_modalCb)_modalCb(v); closeModal(); };
document.getElementById('modal-input').onkeydown = e => { if(e.key==='Enter')document.getElementById('modal-confirm').click(); if(e.key==='Escape')closeModal(); };
document.getElementById('modal-overlay').onclick = e => { if(e.target===document.getElementById('modal-overlay'))closeModal(); };

// ─── Utils ────────────────────────────────────────────────────
function parseNum(v)       { const n=parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?0:n; }
function parseBillCount(v) { const n=parseInt(String(v).replace(/[^0-9\-]/g,''),10); return isNaN(n)?0:Math.max(0,n); }
function fmt(n)            { return n.toLocaleString('en-CA',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function formatMoney(n)    { return '$'+fmt(n); }
function formatBillCount(n){ return String(parseBillCount(n)); }
function formatDate(d)     { return d?d.toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'}):''; }
function escHtml(s)        { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

window.addEventListener('beforeunload', e => { if(saveTimer){flushSave();e.preventDefault();e.returnValue='';} });
</script>
